<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.jpeg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- SEO and Social Media Meta Tags -->
		<meta name="author" content="Binsar Jr" />
		<meta name="theme-color" content="#0a0b0f" />
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Binsar Jr — Full Stack Engineer" />
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:creator" content="@_binsarjr" />

		<!-- Fonts: Instrument Serif (display) + Inter (body) + JetBrains Mono (mono) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
			rel="stylesheet"
		/>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" style="background-color: #0a0b0f">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
